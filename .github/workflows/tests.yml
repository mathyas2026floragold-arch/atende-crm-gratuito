name: Testes do Atende CRM

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependências
        run: pip install -r backend/requirements.txt

      - name: Verificar sintaxe
        run: python -m compileall -q backend/app

      - name: Importar aplicação
        run: PYTHONPATH=backend python -c "from app.main import app; print(app.version)"

      - name: Executar testes
        run: PYTHONPATH=backend python -m unittest discover -s backend/tests -v

      - name: Validar Docker Compose
        run: |
          cp .env.example .env
          docker compose --env-file .env -f docker-compose.free.yml config
          docker compose --env-file .env -f docker-compose.production.yml config

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        working-directory: frontend
        run: npm ci

      - name: Compilar frontend
        working-directory: frontend
        env:
          VITE_CRM_API_PREFIX: /api
        run: npm run build
